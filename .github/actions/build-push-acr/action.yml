# ============================================================================
# DEPRECATED: Use https://github.com/dronetag/actions/tree/main/build-push-acr


name: Build & push
description: |
  Builds an image using the project's Dockerfile, and pushes it 
  to ACR (Azure Container Registry) repository.
inputs:
  tags:
    type: string
    required: false
    default: latest
  ref:
    type: string
    required: false
    default: ''  # falsy value = fallback to default
  context:
    type: string
    required: false
    default: .
  repository-name:
    type: string
    required: true
  acr-username:
    type: string
    required: false
  acr-password:
    type: string
    required: false
  acr-login-server:
    type: string
    required: false
  github-token:
    type: string
    required: false
  build-args:
    type: string
    required: false
  platforms:
    type: string
    required: false
  actor:
    type: string
    required: false
  ssh_socket_forward:
    required: false
    default: "false"
  private-pypi-host:
    type: string
    required: false
  private-pypi-user:
    type: string
    required: false
  private-pypi-pass:
    type: string
    required: false
  use-buildx:
    type: boolean
    default: false
  use-qemu:
    type: boolean
    default: false
  push:
    type: boolean
    default: true
outputs:
  tags:
    value: ${{ steps.list.outputs.tags }}
runs:
  using: "composite"
  steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        ref: ${{ inputs.ref }}
    - id: auth-acr
      name: Authenticate with ACR
      if: ${{ inputs.push }}
      uses: azure/docker-login@v1
      with:
        login-server: ${{ inputs.acr-login-server }}
        username: ${{ inputs.acr-username }}
        password: ${{ inputs.acr-password }}
    - id: auth-ghcr
      name: Authorize Docker to ghcr.io
      if: ${{ inputs.push }}
      uses: docker/login-action@v1
      with:
        registry: ghcr.io
        username: ${{ inputs.actor }}
        password: ${{ inputs.github-token }}
    - id: list
      name: List output image tags
      env:
        PUSH: ${{ inputs.push }}
        TAGS: ${{ inputs.tags }}
        REGISTRY: ${{ inputs.acr-login-server }}
        REPOSITORY: ${{ inputs.repository-name }}
      shell: bash
      run: |
        if [[ "$PUSH" == "true" ]]; then
          if [[ -z "$REGISTRY" ]]; then
            echo "ACR login server is required when push=true" >&2
            exit 1
          fi
          REPOSITORY_URI="$REGISTRY/$REPOSITORY"
        else
          REPOSITORY_URI="$REPOSITORY"
        fi
        echo "::set-output name=tags::$(echo $TAGS | sed "s|[^ ]*|$REPOSITORY_URI\:&\n|g")"
    - id: collect-ssh-config
      name: Collect Git and SSH config files in a directory that is part of the Docker build context
      if: ${{ inputs.ssh_socket_forward == 'true'}}
      shell: bash
      run: |
        mkdir root-config
        cp -r ~/.gitconfig  ~/.ssh root-config/
    - id: setup-qemu
      name: Set up QEMU
      if: ${{ inputs.use-qemu }}
      uses: docker/setup-qemu-action@v3
    - id: setup-buildx
      name: Set up Docker Buildx
      if: ${{ inputs.use-buildx }}
      uses: docker/setup-buildx-action@v3
    - id: docker_build
      name: Build with no SSH agent socket
      if: ${{ inputs.ssh_socket_forward == 'false'}}
      uses: docker/build-push-action@v6
      with:
        context: ${{ inputs.context }}
        push: ${{ inputs.push }}
        build-args: ${{ inputs.build-args }}
        tags: "${{ steps.list.outputs.tags }}"
        platforms: ${{ inputs.platforms }}
        secrets: |
          "private_pip_url=https://${{ inputs.private-pypi-host }}"
          "private_pip_username=${{ inputs.private-pypi-user }}"
          "private_pip_password=${{ inputs.private-pypi-pass }}"
    - id: docker_build-with-ssh
      name: Build with SSH agent socket
      if: ${{ inputs.ssh_socket_forward == 'true'}}
      uses: docker/build-push-action@v6
      with:
        context: ${{ inputs.context }}
        push: ${{ inputs.push }}
        build-args: ${{ inputs.build-args }}
        tags: "${{ steps.list.outputs.tags }}"
        platforms: ${{ inputs.platforms }}
        ssh: |
          default=${{ env.SSH_AUTH_SOCK }}
        secrets: |
          "private_pip_url=https://${{ inputs.private-pypi-host }}"
          "private_pip_username=${{ inputs.private-pypi-user }}"
          "private_pip_password=${{ inputs.private-pypi-pass }}"
